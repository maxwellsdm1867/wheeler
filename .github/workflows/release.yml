name: Auto-release on version bump

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if release needed
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(python3 -c "
          import re
          text = open('pyproject.toml').read()
          m = re.search(r'^version\s*=\s*\"([\d.]+)\"', text, re.M)
          print(m.group(1) if m else '')
          ")
          echo "version=$version" >> "$GITHUB_OUTPUT"

          # Check if this version already has a release
          if gh release view "v${version}" > /dev/null 2>&1; then
            echo "Release v${version} already exists"
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "No release for v${version} — creating"
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.check.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="v${{ steps.check.outputs.version }}"
          # Build release notes from commits since last tag
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$last_tag" ]; then
            notes=$(git log "${last_tag}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            notes=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          gh release create "$version" \
            --title "Wheeler $version" \
            --notes "$notes" \
            --target main
