# Wheeler service-extension registry: shipped CATALOG of services.
#
# This file is bundled with the package and is the CATALOG: every service that
# is AVAILABLE to enable. It does NOT directly decide what is loaded.
#
# The ENABLED set (what the router and plan acts actually see) is curated in the
# folder .wheeler/services/ : each <id>.yaml file there is one enabled contract.
# Curate it with `wheeler services enable/disable` (or by editing the folder by
# hand). load_services precedence:
#   1. if .wheeler/services/ exists, that folder is the source of truth;
#   2. else the legacy single-file override .wheeler/services.yaml, if present;
#   3. else this bundled catalog (every default enabled until you start curating).
# The folder always wins over the single-file override.
#
# Each entry is a declarative service CONTRACT (one manifest entry per tool):
#   id          stable identifier (kebab-case)
#   provider    the upstream provider (e.g. asta, local)
#   name        human-readable display name
#   description what the service does (one line)
#   kind        shell-out | local
#   act         the /wh:* slash command that drives the service
#   cost        free-text cost/time hint, surfaced as a warning by the router
#   available   shell probe; non-zero exit or missing binary => unavailable
#   when        free-text trigger hint ("use this when ...")
#   inputs      the interview schema: what the router asks the scientist before
#               dispatch. Each port: {name, kind, required, prompt, ...}.
#                 kind: node   -> a graph-node reference; node_type is the label
#                                 (Dataset, Question, ...) and source names the
#                                 graph query that offers the options.
#                 kind: choice -> options + default (rendered as a pick list).
#                 kind: text   -> free text (e.g. a search query).
#               The registry treats inputs opaquely; wheeler/integrations/
#               invocation.py interprets them for the router/plan acts.
#   output      raw_node + produced node types (documentation of the result).
#
# No em dashes anywhere. The router lists only AVAILABLE services.

services:
  - id: paper-finder
    provider: asta
    name: Paper Finder
    description: broad semantic literature discovery, relevance-ranked
    kind: shell-out
    act: /wh:asta-lit
    cost: "cheap"
    available: "asta auth status"
    when: "broad literature discovery (find papers on X, what is known about Y)"
    inputs:
      - { name: query, kind: text, source: query, required: true, prompt: "What should Paper Finder search for?" }
      - { name: link_to, kind: node, node_type: Question, source: query, required: false, prompt: "Which open question or plan does this support?" }
    output:
      raw_node: dataset
      nodes: [Paper]

  - id: theorizer
    provider: asta
    name: Theorizer
    description: literature-grounded theory generation with supporting and contradicting evidence
    kind: shell-out
    act: /wh:asta-theorize
    cost: "expensive (~$7, ~20min)"
    available: "asta auth status"
    when: "hypothesis or theory generation (generate theories about X, what could explain Y)"
    inputs:
      - { name: query, kind: text, source: query, required: true, prompt: "What question should Theorizer generate theories for?" }
      - { name: link_to, kind: node, node_type: Question, source: query, required: false, prompt: "Which open question or plan does this support?" }
    output:
      raw_node: document
      nodes: [Finding, Hypothesis, Paper]

  - id: semantic-scholar
    provider: asta
    name: Semantic Scholar
    description: precise paper lookup plus the citation graph plus snippet evidence
    kind: shell-out
    act: /wh:asta-scholar
    cost: "cheap"
    available: "asta auth status"
    when: "a specific paper, its citations, or snippet evidence (look up Z, what cites Y)"
    inputs:
      - { name: query, kind: text, source: query, required: true, prompt: "Which paper, citation, or snippet query?" }
      - { name: link_to, kind: node, node_type: Question, source: query, required: false, prompt: "Which open question or plan does this support?" }
    output:
      raw_node: dataset
      nodes: [Paper]

  - id: scholar-qa
    provider: asta
    name: Asta Literature Reports
    description: long-form literature review report synthesizing many papers into a written document with citations
    kind: shell-out
    act: /wh:asta-report
    cost: "cheap (literature find + papers lookups)"
    available: "asta auth status"
    when: "a written literature review or comprehensive multi-paper report (write a review of X, synthesize the literature on Y)"
    inputs:
      - { name: query, kind: text, source: query, required: true, prompt: "What topic should the literature review cover?" }
      - { name: link_to, kind: node, node_type: Question, source: query, required: false, prompt: "Which open question or plan does this support?" }
    output:
      raw_node: document
      nodes: [Document, Paper]
    # implemented by wheeler/integrations/asta/scholar_qa.py

  - id: graph-status
    provider: local
    name: Graph Status
    description: local read-only summary of the current Wheeler knowledge graph
    kind: local
    act: /wh:status
    cost: "free"
    available: "wheeler graph status"
    when: "a quick local snapshot of graph health and recent activity, no external service"

  - id: llmsr-discover
    provider: llmsr
    name: LLM-SR Equation Discovery
    description: discover a closed-form equation from a dataset via LLM-guided evolutionary search
    kind: local
    act: /wh:llmsr-discover
    cost: "slow (dozens of sub-agent rounds, minutes)"
    available: "wheeler llmsr --help"
    when: "discover or fit a closed-form equation / symbolic model from a dataset"
    inputs:
      - { name: dataset, kind: node, node_type: Dataset, source: datasets, required: true, prompt: "Which dataset should the equation be fit to?" }
      - { name: question, kind: node, node_type: Question, source: query, required: false, prompt: "Which open question or plan does this address?" }
      - { name: metric, kind: choice, options: [nmse, mse], default: nmse, required: true, prompt: "Which scoring metric should the search optimize?" }
      - { name: select, kind: choice, options: [parsimony, ood, fit], default: parsimony, required: false, prompt: "How should the winning equation be selected?" }
    output:
      raw_node: document
      nodes: [Script, Finding]
    # implemented by wheeler/integrations/llmsr/discover.py
